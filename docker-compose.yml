# dennyPanel — production stack: backend (FastAPI) + frontend (Next.js) + proxy
#
#   cp .env.example .env   # then edit secrets
#
# Plain HTTP (nginx):
#   docker compose --profile http up -d --build
#   -> open http://<server-ip>/
#
# Automatic HTTPS (Caddy + Let's Encrypt; needs DENNY_DOMAIN pointing here and
# ports 80+443 open):
#   docker compose --profile https up -d --build
#   -> open https://<your-domain>/

services:
  backend:
    build: ./backend
    environment:
      DENNY_SECRET_KEY: ${DENNY_SECRET_KEY:?set DENNY_SECRET_KEY in .env}
      DENNY_ADMIN_USERNAME: ${DENNY_ADMIN_USERNAME:-admin}
      DENNY_ADMIN_PASSWORD: ${DENNY_ADMIN_PASSWORD:?set DENNY_ADMIN_PASSWORD in .env}
      DENNY_DATABASE_URL: sqlite:////data/dennypanel.db
      DENNY_SITES_ROOT: /opt/dennypanel/sites
      # Two trusted proxy hops in front of the backend: the LAN edge proxy
      # (terminates TLS for the public domain) -> the bundled nginx -> backend.
      # The backend therefore sees X-Forwarded-For "<real client>, <edge>" and
      # must take the 2nd-from-right entry to log the real client IP instead of
      # the edge/nginx internal address. Bump this if you add another proxy.
      DENNY_TRUSTED_PROXIES: ${DENNY_TRUSTED_PROXIES:-2}
      # AI assistant (optional). Key stays server-side; never sent to browser.
      DENNY_ASSISTANT_API_KEY: ${DENNY_ASSISTANT_API_KEY:-}
      DENNY_ASSISTANT_BASE_URL: ${DENNY_ASSISTANT_BASE_URL:-}
      DENNY_ASSISTANT_MODEL: ${DENNY_ASSISTANT_MODEL:-gpt-4o-mini}
      # Reasoning models (e.g. gemini-2.5-flash) spend many tokens "thinking"
      # before the answer; keep this high enough to fit reasoning + reply.
      DENNY_ASSISTANT_MAX_TOKENS: ${DENNY_ASSISTANT_MAX_TOKENS:-2048}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # manage host Docker
      - denny_data:/data                            # SQLite DB
      - denny_sites:/opt/dennypanel/sites           # managed site files
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Leave empty: the terminal uses the same origin via the nginx proxy.
        NEXT_PUBLIC_BACKEND_WS: ${NEXT_PUBLIC_BACKEND_WS:-}
    environment:
      BACKEND_URL: http://backend:8000   # Next.js /api rewrite target
    depends_on:
      - backend
    restart: unless-stopped

  # Plain HTTP reverse proxy. Enable with:  --profile http
  # WARNING: this serves the panel over unencrypted HTTP — the login bearer
  # token travels in cleartext and can be sniffed. Use ONLY on a trusted private
  # network (e.g. behind a VPN). For any internet-facing deployment use the
  # `https` profile (Caddy + Let's Encrypt) instead.
  nginx:
    image: nginx:alpine
    profiles: ["http"]
    ports:
      - "${DENNY_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Automatic HTTPS (Let's Encrypt). Enable with:  --profile https
  caddy:
    image: caddy:2-alpine
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Required for HTTPS — set in .env (e.g. panel.example.com). Soft default
      # so the --profile http path doesn't need it.
      DENNY_DOMAIN: ${DENNY_DOMAIN:-}
      DENNY_ACME_EMAIL: ${DENNY_ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  denny_data:
  denny_sites:
  caddy_data:
  caddy_config:
