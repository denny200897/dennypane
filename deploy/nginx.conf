events {}

http {
    # Required for WebSocket (terminal) upgrade through the proxy
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream denny_frontend { server frontend:3000; }
    upstream denny_backend  { server backend:8000; }

    server_tokens off;

    server {
        listen 80;
        server_name _;
        client_max_body_size 110m;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # API + WebSocket terminal -> backend
        location /api/ {
            proxy_pass http://denny_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;   # keep long-lived terminal sockets open
        }

        # Everything else -> Next.js frontend
        location / {
            proxy_pass http://denny_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
